    <style>
        /* GitHub风格公告列表 */
        .issues-list {
            max-width: 980px;
            margin: 0 auto;
            border: 1px solid #30363d;
            border-radius: 6px;
        }

        .issue-item {
            padding: 16px;
            border-bottom: 1px solid #30363d;
            background-color: #0d1117;
            transition: background-color 0.12s ease-out;
        }

        .issue-item:last-child {
            border-bottom: 0;
        }

        .issue-item:hover {
            background-color: #161b22;
        }

        .issue-link {
            display: flex;
            gap: 8px;
            text-decoration: none !important;
        }

        .issue-icon {
            color: #3fb950;
            margin-top: 4px;
        }

        .issue-content {
            flex-grow: 1;
        }

        .issue-title {
            color: #e6edf3;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .issue-meta {
            display: flex;
            gap: 16px;
            color: #7d8590;
            font-size: 12px;
        }

        .issue-label {
            display: inline-flex;
            padding: 0 7px;
            font-size: 12px;
            line-height: 18px;
            border: 1px solid #30363d;
            border-radius: 2em;
            background-color: #161b22;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .issue-link {
                flex-direction: column;
            }
            .issue-meta {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
