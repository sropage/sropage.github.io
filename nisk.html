<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - SRO 官方网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 头部导航 */
        #header {
            height: 60px;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #30363d;
            background-color: #161b22;
        }
        
        .nav-button {
            padding: 8px 16px;
            background-color: #21262d;
            border: 1px solid #363b42;
            border-radius: 6px;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .nav-button:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }
        
        .header-title {
            flex-grow: 1;
            text-align: center;
            font-size: 1.2em;
            font-weight: 600;
        }
        
        /* 登录容器 */
        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
        }
        
        /* 玻璃质感登录框 */
        .glass-box {
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid rgba(47, 129, 247, 0.2);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .login-title {
            text-align: center;
            color: #2f81f7;
            margin-bottom: 30px;
            font-size: 1.8em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            color: #e6edf3;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            border-color: #2f81f7;
            outline: none;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            background: #2ea043;
        }
        
        .error-message {
            color: #f85149;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        
        /* 页脚 */
        .contact-info {
            text-align: center;
            color: #7d8590;
            line-height: 1.8;
            border-top: 1px solid #30363d;
            padding: 30px 20px;
            background: #161b22;
        }
        .tixing{
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="header">
        <button class="nav-button" onclick="location.href='index.html'">首页</button>
        <div class="header-title">SRO 官方网站</div>
    </div>
    <p class="tixing">用户名和密码可以直接通过F12窃取，登录系统防君子不防小人。</p>
    <div class="login-container">
        <div class="glass-box">
            <h2 class="login-title">青鸾云盘</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="username" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="password" required>
                </div>
                
                <button type="submit" class="login-btn">登录</button>
                
                <div class="error-message" id="errorMessage">
                    用户名或密码错误
                </div>
            </form>
        </div>
    </div>

    <div class="contact-info">
        <p>SRO 版权所有</p>
        <p>联系我们</p>
        <p>QQ群 : 1032407123</p>
        <p>邮箱 : sroniko@outlook.com</p>
    </div>

    <script>
        const users = {
            // "username": {
            //     password: "userpassword",
            //     redirect: "user-page.html"
            // },
            "Niko": {
                password: "srozzk613",
                redirect: "http://111.230.98.67:10736/D%3A/Nisk/Niko"
            },
            "username": {
                password: "userpassword",
                redirect: "user-page.html"
            },
            "username": {
                password: "userpassword",
                redirect: "user-page.html"
            },
            "username": {
                password: "userpassword",
                redirect: "user-page.html"
            },
            "username": {
                password: "userpassword",
                redirect: "user-page.html"
            },

        };

        // 登录表单处理
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // 验证用户凭据
            if (users[username] && users[username].password === password) {
                // 登录成功，跳转到对应页面
                window.location.href = users[username].redirect;
            } else {
                // 登录失败，显示错误信息
                errorMessage.style.display = 'block';
                
                // 3秒后隐藏错误信息
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
