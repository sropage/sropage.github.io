    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #0d1117;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}

#header {
    height: 5vh;
    width: 100%;
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid #30363d;
    background-color: #161b22;
}

.nav-button {
    width: 10%;
    padding: 8px 16px;
    background-color: #21262d;
    border: 1px solid #363b42;
    border-radius: 6px;
    color: #ffffff;
    cursor: pointer;
    transition: background-color 0.2s;
}

.nav-button:hover {
    background-color: #30363d;
    border-color: #8b949e;
}

.header-title {
    flex-grow: 1;
    text-align: center;
    font-size: 1.2em;
    font-weight: 600;
}
#body {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 20px;
}

.slogan {
    text-align: center;
    margin-bottom: 60px;
}

.slogan h1 {
    font-size: 2.5em;
    margin-bottom: 16px;
    color: #e6edf3;
}

.slogan h2 {
    font-size: 1.8em;
    color: #7d8590;
}

.sections-container {
    display: grid;
    grid-template-columns: repeat(1, 1fr); /* 改为三列布局 */
    gap: 30px;
    margin-bottom: 60px;
}

.section-box {
    background-color: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 24px;
}

.section-title {
    font-size: 1.4em;
    margin-bottom: 16px;
    color: #2f81f7;
}

.link-list {
    list-style: none;
}

.link-item {
    margin: 8px 0;
    display: inline-block;
}

.link-item a {
    color: #e6edf3;
    text-decoration: none;
    transition: color 0.2s;
}

.link-item a:hover {
    color: #2f81f7;
    text-decoration: underline;
}

.contact-info {
    text-align: center;
    color: #7d8590;
    line-height: 1.8;
    border-top: 1px solid #30363d;
    padding-top: 30px;
}




.image-container {
    position: relative;
    width: 100%;
    height: 400px;
    background-color: #f5f5f5;
    border-radius: 8px;
    overflow: hidden;
}

.dual-load-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.5s ease;
}
/* 调用方法
<img class="dual-load-img" 
     data-primary="第一个图片URL" 
     data-fallback="第二个图片URL" 
     alt="图片描述">
*/
.dual-load-img.loaded {
    opacity: 1;
}

.loading-indicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #666;
    font-family: Arial, sans-serif;
}

.error-placeholder {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, #f0f0f0, #e0e0e0);
    align-items: center;
    justify-content: center;
    color: #999;
    font-family: Arial, sans-serif;
}
        /* 软件卡片容器 */
        .software-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 单个软件卡片 */
        .software-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.2s;
        }

        .software-card:hover {
            transform: translateY(-5px);
            border-color: #2f81f7;
        }

        /* 软件图标 */
        .software-icon {
            width: 256px;
            height: 256px;
            margin-bottom: 16px;
            border-radius: 12px;
            object-fit: cover;
        }

        /* 软件信息 */
        .software-name {
            font-size: 1.2em;
            color: #e6edf3;
            margin-bottom: 4px;
        }

        .software-version {
            color: #7d8590;
            font-size: 0.9em;
            margin-bottom: 12px;
        }

        .software-desc {
            color: #8b949e;
            font-size: 0.95em;
            line-height: 1.5;
            min-height: 72px;
            margin-bottom: 16px;
        }

        /* 下载按钮 */
        .download-btn {
            display: block;
            width: 100%;
            padding: 8px 16px;
            background: #238636;
            color: white;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background: #2ea043;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .software-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .software-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
