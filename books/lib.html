    <style>
        .library-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 30px;
            max-width: 1280px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .book-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            transition: transform 0.2s;
        }

        .book-card:hover {
            transform: translateY(-5px);
            border-color: #2f81f7;
        }

        .book-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .book-title {
            color: #e6edf3;
            font-size: 14px;
            margin-bottom: 8px;
            height: 40px;
            overflow: hidden;
        }

        .book-author {
            color: #7d8590;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .read-btn {
            display: block;
            width: 100%;
            padding: 8px;
            background: #238636;
            color: white;
            text-align: center;
            border-radius: 4px;
            text-decoration: none;
            font-size: 13px;
            transition: background 0.2s;
        }

        .read-btn:hover {
            background: #2ea043;
        }

        @media (max-width: 1200px) {
            .library-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .library-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .library-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
